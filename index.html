 <!-- carpeta base
 lo vamos a usar para poder contener los archivos basicos, ejemplo el reset , estilos globales

 la carpeta layout
 me sirve para contener las grillas de grid o las estrucutra del layout de flex o grid

 la carpeta page 
 me va a servir para poder trabajar los estilos de los html secundarios

 la carpeta utilities
 me va a servir para las utilidades de sass como mixin , exten, estrucutra 

 la propiedad "transition" nos siver para los segundos, la propiedad transform para mover
 por ejemple 
        transition-duration: 2s;
        transform: rotate(200px); -->
<!-- 
animaciones: como vincular
primero agregarle el nombre a la clase que estemos trabajando en CSS.
Ej: .caja:hover{
    color:blue;
    animation: moverDerecha 3s ease infinite;
}

luego creas el keyframe
Ej: @keyframe moverDerecha{
from{
    transition-duration: 0s;
    transform: rotate(0)
        

to{
    transition-duration: 2s;
    transform: rotate(180deg)
        
}
} -->
<!-- 
Para crear una tabla en HTML se usan las etiquetas:

<table> → tabla
<tr> → fila
<th> → encabezado de columna
<td> → celda de datos
Ejemplo básico
<table border="1">
  <tr>
    <th>Nombre</th>
    <th>Edad</th>
    <th>Ciudad</th>
  </tr>
  <tr>
    <td>Ana</td>
    <td>25</td>
    <td>Buenos Aires</td>
  </tr>
  <tr>
    <td>Juan</td>
    <td>30</td>
    <td>Córdoba</td>
  </tr>
</table>

Resultado:

Nombre	Edad	Ciudad
Ana	25	Buenos Aires
Juan	30	Córdoba -->

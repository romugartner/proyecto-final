<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../css/main.css">
    <title>Contacto</title>
</head>

<body>
    


 <header>
        <div class="title">
            <h1>Cerveceria Rogart - Villalonga</h1>
        </div>
        
        <div class="navegador">
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <img src="../img/logo.jpg" alt="imagen logo rogart">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">

                        <a class="nav-link menu-color" aria-current="page"  href="../index.html">Inicio</a>
                    
                        <a class="nav-link menu-color" href="../pages/product.html">Productos</a>
                        </a>
                        <a class="nav-link menu-color" href="#">Contacto</a>

                        <a class="nav-link menu-color" href="../pages/service.html">Servicios</a>
                        <a class="nav-link menu-color" href="../pages/others.html">Otros</a>
                        
                    </div>
                </div>
            </div>
        </nav>
    </header>
    
    
     <!-- propiedades del main -->

    <main class="main-contact">
            <form action="https://www.facebook.com/people/Rogart/100063512283503/?locale=pt_BR#" method="POST" class="form">
                <h2>Contactanos</h2>

                    <div class="nombre">
                        <label for="nombre">Coloca tu nombre</label>
                        <input type="text" id="nombre" name=username placeholder="Aqui coloca tu nombre">
                    </div>


                    <div class="password"> 
                        <label for="password">Coloca tu clave</label>
                        <input type="password" id="password" name=password  required placeholder="Aqui coloca tu clave">
                    </div>
        
                    <div class="email">
                        <label for="email">Coloca tu email</label>
                        <input type="email" id="email" placeholder="Aqui coloca tu mail">
                    </div>
        

                    <div>
                        <label for="consulta"></label>
                        <input type="text" id="consulta" name=username   placeholder="Dejanos tu consulta">
                    </div>
        
                    <button type="submit">Enviar</button>
                    <button type="reset">Restablecer</button>
                
            </form>
    
    </main>

  <section>
         
        <div class="card">
            <div class="card-body style-card">
                <p>Hoy ademas tenemos pizza libre</p>
            </div>
        </div>

         <div class="card">
            <div class="card-body style-card">
                <p>HAPPY-HOUR de las 19 a 20:30hs</p>
            </div>
        </div>

    </section>

   


    <!-- propiedades del footer -->

             <div class="derechos">

                    <a href="https://www.instagram.com/rogart_villalonga/">
                        <img src="../img/logo-insta.jpeg" alt="logo de instagram">
                    </a>
                    <a href="https://www.facebook.com/p/Rogart-Villalonga-100063151514967/">
                        <img src="../img/logo-face.jpeg" alt="logo de facebook">
                    </a>
            </div>
    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
